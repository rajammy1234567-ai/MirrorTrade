  <body>
    <div id="mt-version">
      BUILD DIAG-8 · http://localhost:3456 · pink bar = new HTML loaded
    </div>

    <noscript>Enable JavaScript to run MirrorTrade.</noscript>

    <div id="root">
      <div id="mt-boot">
        <div class="logo"></div>
        <h1>MirrorTrade</h1>
        <p id="mt-boot-msg">Loading app…</p>
        <p class="err" id="mt-boot-err" style="display: none"></p>
      </div>
    </div>

    <script>
      (function () {
        var boot = document.getElementById("mt-boot");
        var msg = document.getElementById("mt-boot-msg");
        var err = document.getElementById("mt-boot-err");

        function hideBoot() {
          if (boot && boot.parentNode) boot.parentNode.removeChild(boot);
        }

        var obs = new MutationObserver(function () {
          var root = document.getElementById("root");
          if (!root) return;
          var kids = root.children;
          for (var i = 0; i < kids.length; i++) {
            if (kids[i].id !== "mt-boot") {
              hideBoot();
              obs.disconnect();
              return;
            }
          }
        });
        var root = document.getElementById("root");
        if (root) obs.observe(root, { childList: true, subtree: true });

        setTimeout(function () {
          if (!document.getElementById("mt-boot")) return;
          if (msg) msg.textContent = "Still loading…";
          if (err) {
            err.style.display = "block";
            err.innerHTML =
              "JS bundle slow/failed. Press F12 → Console.<br/>" +
              "Hard refresh: Ctrl+Shift+R<br/>" +
              "Use: <b>http://localhost:3456</b>";
          }
        }, 10000);

        window.addEventListener("error", function (e) {
          if (!err) return;
          err.style.display = "block";
          err.textContent = "JS error: " + (e.message || "unknown");
        });
      })();
    </script>
